version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: utsav-postgres
    environment:
      POSTGRES_USER: utsav
      POSTGRES_PASSWORD: utsav_password
      POSTGRES_DB: utsav_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utsav -d utsav_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: utsav-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: utsav-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://utsav:utsav_password@postgres:5432/utsav_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: